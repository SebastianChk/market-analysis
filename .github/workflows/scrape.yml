name: Scrape Job Market Data

on:
  schedule:
    # Runs every day at 08:00 UTC.
    # https://crontab.guru
    - cron: "0 8 * * *"

  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit data files back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run scraper
        # --page-limit 20 is a safe default for scheduled runs — increase as needed.
        # Use --all-pages if you want everything (be mindful of rate limits).
        run: uv run scraper.py --page-limit 20

      - name: Generate GitHub Pages index
        run: uv run generate_index.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "scrape: $(date -u '+%Y-%m-%d')"
          git push
